<!DOCTYPE html>
<html>
  <head>
    <title>Tech Specs-Register</title>
    <link rel="STYLESHEET" href="CSS CODES/REGISTER.CSS">
  </head>

  <body>
    <a href="HOME.HTML" class="HOME">Home</a>

    <form class="MAIN" action="LOGIN.HTML">
      <label class="CA">Create an account</label>
      <img src="LOGOS/LOGO.png" height="150">
      <label class="FN" id="W">First Name:</label>
      <input class="FNB" id="T" type="textbox" placeholder="First Name" required>
      <label class="SN" id="W">Last Name:</label>
      <input class="SNB" id="T" type="textbox" placeholder="Last Name" required>
      <label class="EW">Email:</label>
      <input class="EML" id="T" style="width: 399PX;" type="email" placeholder="Email" required>
      <label class="PW">Password:</label>
      <input class="PSD" id="T" style="width: 367PX;" type="password" placeholder="Password" required>
      <label class="WORD">What Device You Use Most ?</label>
      <label class="LM">Laptop:</label>
      <label class="PM">Phone:</label>
      <input class="LT" type="radio" name="R" required>
      <input class="PH" type="radio" name="R" required>
      <input class="REG" type="submit" value="Register">
      <p>Already have an account? Please <a href="LOGIN.HTML">Login</a></p>
    </form>
  </body>
</html>
